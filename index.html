<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Student Carry</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var redirectPath = sessionStorage.getItem("studentCarryRedirectPath");
        if (redirectPath) {
          sessionStorage.removeItem("studentCarryRedirectPath");
          history.replaceState(null, "", redirectPath);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
